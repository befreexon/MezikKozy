{% extends 'base.html' %}
{% load static %}

{% block title %}Přihlásit se – Mezi Kostkami{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Přihlásit se</h2>

    {% if form.errors %}
      <div class="form-error">Nesprávné jméno nebo heslo.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Uživatelské jméno</label>
        <input type="text" id="id_username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="id_password">Heslo</label>
        <input type="password" id="id_password" name="password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="action-btn primary">Přihlásit se</button>
    </form>

    <p class="auth-link">Nemáte účet? <a href="{% url 'accounts:register' %}">Registrovat se</a></p>
  </div>
</div>
{% endblock %}
